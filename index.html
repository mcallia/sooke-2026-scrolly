async function unlock(pw) {
  const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64(PAYLOAD.salt), iterations:310000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(PAYLOAD.iv) }, key, b64(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}
async function attempt(pw, silent) {
  try {
    const html = await unlock(pw);
    sessionStorage.setItem('scrolly_pw', pw);
    document.open(); document.write(html); document.close();
  } catch (e) {
    if (!silent) document.getElementById('err').textContent = 'That phrase didn\u2019t work \u2014 check with whoever sent you this link.';
  }
}
document.getElementById('f').addEventListener('submit', ev => {
  ev.preventDefault();
  attempt(document.getElementById('pw').value.trim(), false);
});
const saved = sessionStorage.getItem('scrolly_pw');
if (saved) attempt(saved, true);
